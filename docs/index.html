<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subnautica 2 — Lore Search</title>
    <meta name="description" content="Searchable databank entries extracted from Subnautica 2 (Early Access).">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="wrap">
            <h1>Lore Search</h1>
            <p class="tagline">Static site that lets you search lore relevant text from the game.</p>
            <p class="meta" id="meta">Loading…</p>
        </div>
    </header>

    <section class="controls">
        <div class="wrap">
            <input id="search" type="search" placeholder='Search title, body, or category…  (use "quotes" for exact phrase)' autocomplete="off" spellcheck="false">
            <div class="filters">
                <button id="expand-all"   type="button" class="link-btn">Expand all</button>
                <button id="collapse-all" type="button" class="link-btn">Collapse all</button>
                <span class="result-count" id="result-count"></span>
            </div>
        </div>
    </section>

    <main class="wrap">
        <ul id="tree" class="tree"></ul>
        <p id="empty" class="empty" hidden>No entries match.</p>
    </main>

    <footer class="site-footer">
        <div class="wrap">
            <p>Built from Subnautica 2 game files. Not affiliated with Unknown Worlds or Krafton. Source data is © Unknown Worlds.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
